name: macOS Build

on:
  push:
    branches: [main, publish-clean]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Version number (e.g., 1.0.1)
        required: false
        default: 1.0.1

permissions:
  contents: read

env:
  APP_NAME: VoiceLinkNative

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        working-directory: swift-native/VoiceLinkNative
        run: swift package resolve

      - name: Build release
        working-directory: swift-native/VoiceLinkNative
        run: swift build -c release

      - name: Create app bundle
        working-directory: swift-native/VoiceLinkNative
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="${INPUT_VERSION:-1.0.1}"
          APP_BUNDLE="$APP_NAME.app"

          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"

          cp .build/release/$APP_NAME "$APP_BUNDLE/Contents/MacOS/"

          if [ -d "Resources" ]; then
            cp -R Resources/* "$APP_BUNDLE/Contents/Resources/" 2>/dev/null || true
          fi

          cat > "$APP_BUNDLE/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>$APP_NAME</string>
            <key>CFBundleIdentifier</key><string>net.devinecreations.voicelink</string>
            <key>CFBundleName</key><string>VoiceLink</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>$VERSION</string>
            <key>CFBundleVersion</key><string>$RUN_NUMBER</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSMicrophoneUsageDescription</key><string>VoiceLink needs microphone access for voice chat.</string>
          </dict>
          </plist>
          PLIST

          echo -n "APPL????" > "$APP_BUNDLE/Contents/PkgInfo"

      - name: Create DMG
        working-directory: swift-native/VoiceLinkNative
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="${INPUT_VERSION:-1.0.1}"
          DMG_NAME="VoiceLink-${VERSION}-macOS.dmg"

          rm -rf dmg_contents
          mkdir -p dmg_contents
          cp -R "$APP_NAME.app" dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "VoiceLink $VERSION" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceLinkNative-app-bundle
          path: swift-native/VoiceLinkNative/VoiceLinkNative.app
          retention-days: 30

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceLink-macOS-DMG
          path: swift-native/VoiceLinkNative/*.dmg
          retention-days: 30
