version: '3.9'
services:
  voicelink:
    image: node:20-bookworm
    container_name: voicelink-local-api
    working_dir: /app
    command: bash -lc "npm install --omit=dev && node server/routes/local-server.js"
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=3010
      - VOICELINK_DOWNLOAD_BASE=https://voicelink.devinecreations.net/downloads/voicelink
    volumes:
      - ..:/app
    restart: unless-stopped
